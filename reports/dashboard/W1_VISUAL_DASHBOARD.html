<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>W1 · 世界杯赛前预测控制台</title>
<style>
:root{
  --bg:#0a0f0d;--panel:#0f1512;--panel2:#131b17;--line:#1c2620;--line2:#243029;
  --ink:#e8f0ea;--mut:#7e8c83;--mut2:#566058;
  --green:#35e08e;--amber:#f5b833;--blue:#5aa9e6;--red:#e8654f;--purple:#b99cf0;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
button{font:inherit;cursor:pointer}
.app{display:grid;grid-template-rows:auto auto auto 1fr auto;height:100vh;overflow:hidden}

/* top */
.top{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0d1410,#0a0f0d)}
.logo{width:25px;height:25px;border-radius:7px;background:var(--green);display:grid;place-items:center;font-size:14px;flex:none}
.brand b{font-weight:800} .brand small{display:block;color:var(--mut);font-size:9.5px;letter-spacing:2px;font-family:var(--mono)}
.top .sp{flex:1}
.scards{display:flex;gap:7px}
.sc{display:flex;align-items:center;gap:6px;border:1px solid var(--line2);border-radius:7px;padding:4px 9px;font-family:var(--mono);font-size:11px}
.sc b{font-size:14px} .sc .lb{color:var(--mut);font-size:10px}
.sc.wait b{color:var(--amber)} .sc.watch b{color:var(--blue)} .sc.play b{color:var(--green)} .sc.pass b{color:var(--mut)}
.pill{font-family:var(--mono);font-size:10.5px;color:var(--green);border:1px solid #1c3a2a;border-radius:6px;padding:3px 8px;display:inline-flex;align-items:center;gap:6px}
.pill i{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.pill.off{color:var(--mut);border-color:var(--line2)} .pill.off i{background:var(--mut2);box-shadow:none}

/* boss strip */
.boss{display:flex;align-items:center;gap:18px;padding:8px 16px;border-bottom:1px solid var(--line);background:#0c110e;font-size:12px;overflow-x:auto}
.boss .bt{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--amber);white-space:nowrap}
.boss .bi{white-space:nowrap;color:var(--mut)} .boss .bi b{color:var(--ink);font-weight:600}
.boss .x{margin-left:auto;border:1px solid var(--line2);background:transparent;color:var(--mut);border-radius:6px;padding:3px 9px;font-size:11px;white-space:nowrap}

.main{display:grid;grid-template-columns:236px 1fr;min-height:0}
.rail{border-right:1px solid var(--line);overflow-y:auto;background:#0c110e}
.rail-h{position:sticky;top:0;z-index:2;background:#0c110e;padding:9px 13px 8px;border-bottom:1px solid var(--line);font-size:10px;letter-spacing:1.5px;color:var(--mut);font-family:var(--mono)}
.rail-h b{color:var(--ink)}
.rail-h .td{color:var(--amber)}
.daystrip{display:flex;gap:6px;padding:7px 16px;border-bottom:1px solid var(--line);background:#0c110e;overflow-x:auto}
.daystrip .dlab{flex:none;align-self:center;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--mut2);margin-right:4px}
.day{flex:none;border:1px solid var(--line2);border-radius:8px;background:transparent;color:var(--mut);padding:5px 11px;text-align:center;position:relative;min-width:62px}
.day b{display:block;font-family:var(--mono);font-size:13px;color:var(--ink);font-weight:700;line-height:1.2}
.day small{font-size:9px;color:var(--mut);font-family:var(--mono)}
.day:hover{border-color:var(--mut2)}
.day.on{border-color:var(--green);background:#10211a}
.day.on b{color:var(--green)}
.day.today{box-shadow:inset 0 -2px 0 var(--amber)}
.day i{position:absolute;top:-6px;right:-3px;font-size:8px;background:var(--amber);color:#0a140d;border-radius:4px;padding:0 3px;font-style:normal;font-family:var(--sans)}
.day i.now{background:var(--green)}
.mrow{display:block;width:100%;text-align:left;border:0;border-bottom:1px solid var(--line);background:transparent;color:inherit;padding:8px 13px}
.mrow:hover{background:#101713}
.mrow.on{background:#10211a;box-shadow:inset 3px 0 0 var(--green)}
.mrow .mt{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.mrow .mt .vs{color:var(--mut2);font-weight:400;font-size:10px}
.mrow .mm{display:flex;align-items:center;gap:7px;margin-top:3px;color:var(--mut);font-size:10px;font-family:var(--mono)}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.dot.fin{background:var(--green)} .dot.up{background:var(--amber)} .dot.wait{background:var(--mut2)}
.tag{font-family:var(--mono);font-size:9.5px;padding:1px 5px;border-radius:4px;border:1px solid var(--line2)}
.tag.ft{color:var(--green);border-color:#1c3a2a} .tag.main{color:var(--amber);border-color:#3a2f17}

.panel{overflow-y:auto;padding:14px 18px 22px}
.ph{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:10px}
.ph .teams{font-size:19px;font-weight:800} .ph .teams .vs{color:var(--mut2);font-weight:400;margin:0 7px}
.ph .ko{font-family:var(--mono);color:var(--mut);font-size:11.5px}
.badge{font-family:var(--mono);font-size:10.5px;padding:3px 9px;border-radius:6px;font-weight:700}
.badge.pass{color:#0a140d;background:var(--green)} .badge.wait{color:var(--amber);border:1px solid #3a2f17}
.badge.guard-ok{color:#0a140d;background:var(--green)} .badge.guard-no{color:#fff;background:var(--red)}

/* stages / predict bar */
.predict{border:1px solid var(--line);border-radius:11px;background:var(--panel);padding:11px 13px;margin-bottom:13px}
.prow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.sel{display:flex;align-items:center;gap:6px;background:#0c120f;border:1px solid var(--line2);border-radius:8px;padding:5px 9px}
.sel select{background:transparent;border:0;color:var(--ink);font:inherit;font-weight:600;outline:none;max-width:130px}
.vsdot{color:var(--amber);font-weight:800;font-family:var(--mono)}
.stages{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.stg{font-family:var(--mono);font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--line2);color:var(--mut);background:transparent;position:relative}
.stg small{display:block;font-size:8.5px;opacity:.75;font-family:var(--sans)}
.stg.sel{color:#0a140d;background:var(--green);border-color:var(--green);font-weight:700}
.stg .cur{position:absolute;top:-6px;right:-4px;font-size:8px;background:var(--amber);color:#0a140d;border-radius:4px;padding:0 3px;font-family:var(--sans)}
.go{background:var(--amber);color:#0a140d;font-weight:800;border:0;border-radius:9px;padding:9px 20px;font-size:13px}
.go:disabled{opacity:.5}
.go.off{background:#1a2018;color:var(--mut2);cursor:not-allowed;border:1px solid var(--line2);opacity:1}
.banner{margin:0 0 12px;padding:9px 13px;border-radius:9px;font-size:12px;line-height:1.55;border:1px solid #3a2f17;background:rgba(245,184,51,.06);color:var(--ink)}
.banner code{font-family:var(--mono);color:var(--amber);background:rgba(245,184,51,.12);padding:0 4px;border-radius:3px}
.banner .bi2{color:var(--amber);margin-right:5px;font-size:11px}
.banner.ok{border-color:#1c3a2a;background:rgba(53,224,142,.06)}
.banner.ok .bi2{color:var(--green)}
.guardnote{margin:-6px 0 12px;font-size:11.5px;color:var(--mut);line-height:1.55;padding:7px 11px;border-left:2px solid var(--red);background:rgba(232,101,79,.05);border-radius:0 7px 7px 0}
.guardnote b{color:var(--ink)}
.core2{display:grid;grid-template-columns:1.25fr 1fr;gap:14px;margin-bottom:14px}
.risksum{font-size:12.5px;line-height:1.55;color:var(--ink)}
.expbtn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:1px solid var(--line2);border-radius:10px;background:#0e1411;color:var(--ink);padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:600}
.expbtn:hover{border-color:var(--mut2);background:#101713}
.expbtn small{color:var(--mut);font-weight:400;font-size:11px;margin-left:8px}
.expbtn>span{font-family:var(--mono);color:var(--green)}
#expert{display:none}
#expert.open{display:block}
.prog{margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--mut);display:none}
.prog.on{display:block}
.prog .pm{color:var(--green)} .prog .pe{color:var(--amber)}
.proglist{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.proglist span{border:1px solid var(--line2);border-radius:5px;padding:2px 7px;font-size:10px}

/* recommendation */
.rec{display:grid;grid-template-columns:auto auto 1fr;border:1px solid #3a2f17;border-radius:11px;overflow:hidden;
  background:linear-gradient(180deg,rgba(245,184,51,.10),rgba(245,184,51,.03));margin-bottom:14px}
.rec .cell{padding:10px 15px;border-right:1px solid rgba(245,184,51,.18)}
.rec .cell:last-child{border-right:0}
.rec .k{font-size:10px;letter-spacing:1px;color:#caa24a;font-family:var(--mono);margin-bottom:3px}
.rec .v{font-size:21px;font-weight:800;font-family:var(--mono);color:var(--amber);line-height:1.1}
.rec .v small{font-size:11px;color:#caa24a}
.rec .v.sec{color:#caa24a}
.rec .act{align-self:center;font-size:12px}
.rec .act .l2{color:var(--ink);margin-top:2px} .rec .act .l3{color:var(--mut);font-size:10.5px;margin-top:3px}
.marketstate{display:flex;align-items:center;gap:10px;flex-wrap:wrap;border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:9px 12px;margin:-2px 0 14px;font-size:12px}
.marketstate .mklabel{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:1px}
.marketstate b{font-family:var(--mono)}
.marketstate.stable b{color:var(--green)} .marketstate.moving b{color:var(--amber)} .marketstate.alert b,.marketstate.conflict b{color:var(--red)} .marketstate.thin b{color:var(--mut)}
.marketstate small{margin-left:auto;color:var(--mut);font-family:var(--mono)}

.cols{display:grid;grid-template-columns:minmax(320px,1.05fr) 1fr;gap:14px;align-items:start;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:980px){.cols,.grid2,.core2{grid-template-columns:1fr}}
.card{border:1px solid var(--line);border-radius:11px;background:var(--panel);padding:12px 14px;margin-bottom:14px}
.card.tight{margin-bottom:0}
.card h3{margin:0 0 9px;font-size:10.5px;letter-spacing:1.2px;color:var(--mut);font-weight:700;font-family:var(--mono);display:flex;align-items:center;gap:8px}
.card h3 .r{margin-left:auto;color:var(--mut2);font-weight:400;letter-spacing:.5px;text-transform:none}

/* matrix */
.mxwrap{display:flex;gap:7px}
.mxaxis-y{display:flex;flex-direction:column;justify-content:space-around;align-items:center;font-family:var(--mono);font-size:10px;color:var(--mut2);padding-top:17px}
.mx{flex:1}
.mxhead{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.mxhead span{text-align:center;font-family:var(--mono);font-size:9.5px;color:var(--mut2)}
.mxgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cx{aspect-ratio:1;border-radius:4px;display:grid;place-items:center;font-family:var(--mono);font-size:9px;color:var(--ink);background:var(--panel2);position:relative}
.cx.lo{color:var(--mut2)}
.cx.pri{outline:2px solid var(--amber);outline-offset:-2px;z-index:1}
.cx.sec{outline:1.5px dashed var(--amber);outline-offset:-2px}
.cx.act::after{content:"";position:absolute;inset:2px;border:2px solid var(--red);border-radius:4px}
.axlab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--mut2);margin-top:4px;padding:0 2px}
.mxleg{display:flex;align-items:center;gap:7px;margin-top:7px;font-family:var(--mono);font-size:9px;color:var(--mut2);flex-wrap:wrap}
.sw{width:9px;height:9px;border-radius:2px;display:inline-block;background:#1a2a20}
.mklab{display:inline-flex;align-items:center;gap:4px}
.legbar{height:7px;width:54px;border-radius:3px;background:linear-gradient(90deg,#131b17,var(--green))}

/* bars */
.bars{display:flex;flex-direction:column;gap:6px}
.brow{display:grid;grid-template-columns:36px 1fr 44px;align-items:center;gap:8px;font-family:var(--mono);font-size:11px}
.brow .sc{font-weight:600} .brow .pct{text-align:right;color:var(--mut)}
.track{height:13px;background:#0c120f;border-radius:4px;overflow:hidden;border:1px solid var(--line)}
.fill{height:100%;border-radius:3px}

.mvm{display:flex;flex-direction:column;gap:9px}
.hda{display:grid;grid-template-columns:46px 1fr;gap:8px;align-items:center}
.hda .lab{font-family:var(--mono);font-size:10px;color:var(--mut)}
.tri{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.seg{height:21px;border-radius:4px;display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:#0a140d;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.kc{font-family:var(--mono);font-size:10px;border:1px solid var(--line2);border-radius:6px;padding:2px 7px;color:var(--mut)}
.kc b{color:var(--ink)} .kc.ok b{color:var(--green)} .kc.bad b{color:var(--red)}
.mtbl{overflow:auto;border:1px solid var(--line);border-radius:8px;margin-top:9px}
.mtbl table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:10px;min-width:620px}
.mtbl th,.mtbl td{border-bottom:1px solid var(--line);padding:5px 7px;text-align:right;white-space:nowrap}
.mtbl th:first-child,.mtbl td:first-child,.mtbl th:nth-child(2),.mtbl td:nth-child(2){text-align:left}
.mtbl tr:last-child td{border-bottom:0}
.mtbl th{color:var(--mut);font-weight:600;background:#0c120f}

.scen{display:flex;flex-direction:column;gap:7px}
.scrow{display:grid;grid-template-columns:96px 1fr 42px;align-items:center;gap:9px;font-size:11px}
.scrow .nm{color:var(--mut)} .scrow .pct{font-family:var(--mono);text-align:right}
.paths{margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:11px;color:var(--mut);line-height:1.5}
.pchip{display:inline-flex;gap:5px;align-items:center;font-family:var(--mono);font-size:10px;border:1px solid var(--line2);border-radius:5px;padding:2px 7px;margin:3px 4px 0 0}
.pchip.tail{border-color:#3a2230;color:#c98}

/* data quality / play guard */
.dq{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}
.dqi{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:var(--panel2)}
.dqi .t{font-family:var(--mono);font-size:10px;color:var(--mut);margin-bottom:3px}
.dqi .s{font-family:var(--mono);font-size:12px;font-weight:700}
.s.ok{color:var(--green)} .s.no{color:var(--red)} .s.part{color:var(--amber)} .s.na{color:var(--mut2)}
.guardbar{display:flex;align-items:center;gap:9px;margin-top:10px;padding:9px 11px;border-radius:8px;border:1px solid var(--line)}
.guardbar.no{border-color:#4a2a24;background:rgba(232,101,79,.06)}
.guardbar.ok{border-color:#1c3a2a;background:rgba(53,224,142,.05)}
.guardbar .gl{font-family:var(--mono);font-size:11px;font-weight:700}
.guardbar .fr{font-size:11px;color:var(--mut)}

/* module rows */
.mods{display:flex;flex-direction:column;gap:6px}
.modr{display:grid;grid-template-columns:74px 70px 1fr;align-items:center;gap:9px;font-size:11px;padding:5px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel2)}
.modr .mn{font-weight:600} .modr .ms{font-family:var(--mono);font-size:10px}
.modr .mg{color:var(--mut)}
.ms.ok{color:var(--green)} .ms.skip{color:var(--mut2)} .ms.fail{color:var(--red)} .ms.miss{color:var(--amber)}

/* environment */
.env{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px}
.envi .t{font-family:var(--mono);font-size:10px;color:var(--mut)} .envi .v{font-family:var(--mono);font-size:12px;font-weight:600}
.eflags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.eflag{font-family:var(--mono);font-size:9.5px;border-radius:5px;padding:2px 7px;border:1px solid}
.eflag.h{color:var(--red);border-color:#4a2a24} .eflag.m{color:var(--amber);border-color:#3a2f17} .eflag.l{color:var(--mut);border-color:var(--line2)}

/* factor lists */
.facts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.facts{grid-template-columns:1fr}}
.flist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px}
.flist li{font-size:11px;line-height:1.45;padding-left:16px;position:relative;color:var(--ink)}
.flist li::before{content:"";position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:2px}
.flist.sup li::before{background:var(--green)} .flist.con li::before{background:var(--amber)}
.rflist li,.gaplist li{display:flex;gap:8px;align-items:baseline;font-size:11px;padding:5px 0;border-bottom:1px solid var(--line)}
.sev{font-family:var(--mono);font-size:9px;font-weight:700;border-radius:4px;padding:1px 5px;flex:none}
.sev.HIGH{color:#fff;background:var(--red)} .sev.MEDIUM{color:#0a140d;background:var(--amber)} .sev.LOW{color:var(--mut);border:1px solid var(--line2)}
.blocks{font-family:var(--mono);font-size:9px;color:var(--red);margin-left:auto;flex:none}

/* calibration */
.calib{border:1px solid var(--line);border-left:3px solid var(--green);border-radius:9px;background:var(--panel);padding:12px 14px;margin-bottom:14px}
.calib.miss{border-left-color:var(--red)}
.calgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:11px}
.st .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;color:var(--mut);margin-bottom:3px}
.st .v{font-family:var(--mono);font-size:17px;font-weight:700}
.v.g{color:var(--green)} .v.r{color:var(--red)} .v.b{color:var(--blue)}
.beat{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:5px;font-weight:700}
.beat.y{color:#0a140d;background:var(--green)} .beat.n{color:#fff;background:var(--red)}
.note{font-size:11px;color:var(--mut);line-height:1.5;margin-top:9px}

.foot{display:flex;align-items:center;gap:12px;padding:8px 16px;border-top:1px solid var(--line);background:#0c110e;font-size:11px;color:var(--mut);flex-wrap:wrap}
.foot .sp{flex:1} .foot .warn{color:var(--amber)} .foot a{color:var(--blue);text-decoration:none} .foot a:hover{text-decoration:underline}
.foot .bk{font-family:var(--mono);font-size:10px;color:var(--mut2)}

@media(max-width:860px){
  .main{grid-template-columns:1fr}
  .rail{border-right:0;border-bottom:1px solid var(--line);max-height:130px}
  .rec{grid-template-columns:1fr 1fr}
  .scards{display:none}
}
@media(prefers-reduced-motion:no-preference){.mrow,.stg,.cx{transition:background .12s}}
:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.empty{color:var(--mut2);font-size:11px;font-family:var(--mono)}
</style>
</head>
<body>
<!-- W1 visual checker compatibility marker: WHO -->
<div class="app">
  <div class="top">
    <div class="logo">⚽</div>
    <div class="brand"><b id="brandT">W1 世界杯赛前预测控制台</b><small>DIXON-COLES ENGINE · WATCHER v2</small></div>
    <div class="sp"></div>
    <div class="scards" id="scards"></div>
    <span class="pill off" id="srcPill"><i></i><span id="srcTxt">快照</span></span>
  </div>
  <div class="boss" id="boss"></div>
  <div class="daystrip" id="dayStrip"></div>
  <div class="main">
    <nav class="rail" id="rail"><div class="rail-h"><span id="railTitle">今天</span> · <b id="mcount">–</b> 场</div></nav>
    <section class="panel" id="panel"></section>

<script>
const $=(s,e=document)=>e.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmtP=v=>v==null?'–':(v*100).toFixed(1)+'%';
let D=null,RECS=[],active=0,selStage=null,busy=false,selDay=null,DAYS=[],backendConnected=false,expertOpen=false;

// ---- Dixon-Coles 还原 (与引擎一致) ----
const fact=[1];for(let i=1;i<=12;i++)fact[i]=fact[i-1]*i;
const pois=(k,l)=>Math.exp(-l)*Math.pow(l,k)/fact[k];
const tau=(i,j,lh,la,r)=>i===0&&j===0?1-lh*la*r:i===0&&j===1?1+lh*r:i===1&&j===0?1+la*r:i===1&&j===1?1-r:1;
function matrix(lh,la,r,mg=10){const M=[];let s=0;for(let i=0;i<=mg;i++){M[i]=[];for(let j=0;j<=mg;j++){const v=pois(i,lh)*pois(j,la)*tau(i,j,lh,la,r);M[i][j]=v;s+=v;}}for(let i=0;i<=mg;i++)for(let j=0;j<=mg;j++)M[i][j]/=s;return M;}
const parse=s=>s&&/-/.test(s)?s.split('-').map(Number):null;
const STATUS=r=>r.status==='finished'?'fin':(r.play_guard_pass?'up':'wait');

// ---- 数据加载: 优先后端, 回退内嵌 ----
async function fetchBackendDashboardData(){
  const r=await fetch('/dashboard-data',{cache:'no-store'});
  if(!r.ok)throw new Error('/dashboard-data '+r.status);
  return await r.json();
}
async function loadData(){
  try{const j=await fetchBackendDashboardData();backendConnected=true;markSource(true);return j;}catch(e){}
  backendConnected=false;markSource(false);return JSON.parse($('#w1-data').textContent);
}
function markSource(live){const p=$('#srcPill');p.classList.toggle('off',!live);$('#srcTxt').textContent=live?'实时 · 后端在线':'静态快照';}

const WD=['周日','周一','周二','周三','周四','周五','周六'];
function cstParts(utc){if(!utc)return null;const d=new Date(utc);if(isNaN(d))return null;
  const c=new Date(d.getTime()+8*3600*1000),y=c.getUTCFullYear(),mo=c.getUTCMonth()+1,da=c.getUTCDate();
  return {key:`${y}-${String(mo).padStart(2,'0')}-${String(da).padStart(2,'0')}`,label:`${mo}/${da}`,
    hm:`${String(c.getUTCHours()).padStart(2,'0')}:${String(c.getUTCMinutes()).padStart(2,'0')}`,wd:WD[c.getUTCDay()]};}
function todayKeyCST(){const c=new Date(Date.now()+8*3600*1000);
  return `${c.getUTCFullYear()}-${String(c.getUTCMonth()+1).padStart(2,'0')}-${String(c.getUTCDate()).padStart(2,'0')}`;}
function keyParts(k){const d=new Date(k+'T00:00:00Z');return {label:`${d.getUTCMonth()+1}/${d.getUTCDate()}`,wd:WD[d.getUTCDay()]};}
function prepRecs(){RECS=(D.match_records||[]).slice().sort((a,b)=>String(a.kickoff_utc||'').localeCompare(String(b.kickoff_utc||'')));
  RECS.forEach(r=>{const p=cstParts(r.kickoff_utc);r._day=p?p.key:'未定';r._hm=p?p.hm:'';r._wd=p?p.wd:'';});
  DAYS=[...new Set(RECS.map(r=>r._day))];}
function nextKickoffDay(){const now=Date.now();const r=RECS.find(x=>x.kickoff_utc&&new Date(x.kickoff_utc).getTime()>now);return r?r._day:null;}
function pickDefaultDay(){return nextKickoffDay()||DAYS[DAYS.length-1]||'未定';}
function setActiveToDayDefault(){const inDay=RECS.filter(r=>r._day===selDay);
  const up=inDay.find(r=>r.status!=='finished');active=RECS.indexOf(up||inDay[0]||RECS[0]);if(active<0)active=0;}
function selectDay(k){selDay=k;setActiveToDayDefault();selStage=null;renderDays();renderRail();renderPanel();$('#panel').scrollTop=0;}
function renderDays(){const tk=todayKeyCST(),nd=nextKickoffDay();
  $('#dayStrip').innerHTML='<span class="dlab">赛程</span>'+DAYS.map(k=>{const recs=RECS.filter(r=>r._day===k),fin=recs.filter(r=>r.status==='finished').length;
    const p=keyParts(k),on=k===selDay,isT=k===tk;
    let badge='';
    if(k===nd&&k!==tk)badge='<i>下一场</i>';
    else if(isT)badge='<i class="now">今天</i>';
    return `<button class="day ${on?'on':''} ${isT?'today':''}" onclick="selectDay('${k}')"><b>${p.label}</b><small>${p.wd}·${recs.length}场${fin?`·完${fin}`:''}</small>${badge}</button>`;}).join('');
  const tp=keyParts(selDay);
  let pre=selDay===tk?'<span class="td" style="color:var(--green)">今天</span> ':(selDay===nd?'<span class="td">下一场</span> ':'');
  $('#railTitle').innerHTML=pre+tp.label+' '+tp.wd;
  $('#mcount').textContent=RECS.filter(r=>r._day===selDay).length;}

async function boot(){
  D=await loadData();prepRecs();
  $('#brandT').textContent=D.title_cn||'W1 世界杯赛前预测控制台';
  $('#ledN').textContent=(D.dashboard_binding&&D.dashboard_binding.records_count)||RECS.length;
  selDay=pickDefaultDay();setActiveToDayDefault();
  renderStatusCards();renderBoss();renderReportLinks();renderDays();renderRail();renderPanel();
}

function renderStatusCards(){
  const sc=$('#scards');sc.innerHTML=(D.status_cards_cn||[]).map(c=>
    `<span class="sc ${c.class}" title="${esc(c.hint)}"><b>${c.count}</b><span class="lb">${esc(c.label)}</span></span>`).join('');
}
function renderBoss(){
  const b=D.boss_view||{};const el=$('#boss');
  el.innerHTML=`<span class="bt">赛前参考摘要</span>
    <span class="bi">首场 <b>${esc(b.first_match_cn||'')}</b></span>
    <span class="bi">参考倾向 <b>${esc(b.reference_lean||'')}</b></span>
    <span class="bi">参考比分 <b>${esc(b.reference_score||'')}</b></span>
    <span class="bi">现在该做 <b>${esc(b.current_action||'')}</b></span>
    <span class="bi">正式复盘 <b>${esc(b.formal_review_time_cst||'')}</b></span>
    <button class="x" onclick="this.parentElement.style.display='none'">收起</button>`;
}
function renderReportLinks(){
  $('#reportLinks').innerHTML=(D.report_entrypoints_cn||[]).map(r=>`<a href="${esc(r.path)}" title="${esc(r.path)}">${esc(r.label)}</a>`).join(' · ');
}

function renderRail(){
  const rail=$('#rail');rail.querySelectorAll('.mrow').forEach(n=>n.remove());
  RECS.forEach((r,idx)=>{
    if(r._day!==selDay)return;
    const st=STATUS(r),b=document.createElement('button');
    b.className='mrow'+(idx===active?' on':'');
    b.onclick=()=>{active=idx;selStage=null;renderRail();renderPanel();$('#panel').scrollTop=0;};
    const right=r.status==='finished'?`<span class="tag ft">FT ${r.actual_score?r.actual_score.home+'-'+r.actual_score.away:'–'}</span>`
      :`<span class="tag main">主 ${(r.recommendation_view&&r.recommendation_view.primary_score)||'–'}</span>`;
    b.innerHTML=`<div class="mt">${r.home_flag||''} ${esc(r.home_team_cn)} <span class="vs">vs</span> ${r.away_flag||''} ${esc(r.away_team_cn)}</div>
      <div class="mm"><span class="dot ${st}"></span>${r._hm||''} CST ${right}</div>`;
    rail.appendChild(b);
  });
}

// ---- 子面板 ----
const STAGE_GATE_FLOW=[
  {label_cn:'早盘参考',window_cn:'T-24h+',description_cn:'距开赛超过 24 小时，只做早盘参考。'},
  {label_cn:'赛前观察',window_cn:'T-24h 至 T-6h',description_cn:'进入赛前观察，跟踪盘口、伤停、天气和阵容变化。'},
  {label_cn:'正式判断准备',window_cn:'T-6h 至 T-1h',description_cn:'接近正式判断窗口，准备刷新首发、盘口、天气等关键数据。'},
  {label_cn:'最终版',window_cn:'T-1h 至 T-30m',description_cn:'最终版窗口，等待或确认正式首发和风控。'},
  {label_cn:'锁盘/赛前确认',window_cn:'T-30m 至 开赛',description_cn:'锁盘与赛前确认窗口，只做最后风险复核。'},
  {label_cn:'赛中/已开赛',window_cn:'开赛后',description_cn:'比赛已开赛或已完赛，转入赛中状态或赛后复盘。'}
];
function stageGate(r,nowMs=Date.now()){
  const kickoffMs=r&&r.kickoff_utc?new Date(r.kickoff_utc).getTime():NaN;
  if(!Number.isFinite(kickoffMs))return {label_cn:r&&r.prediction_stage_cn||'赛前观察',window_cn:'kickoff_time 暂缺',delta_hours:null,description_cn:'开赛时间暂缺，按赛前观察处理。'};
  const delta=(kickoffMs-nowMs)/3600000;
  if(delta>24)return {...STAGE_GATE_FLOW[0],delta_hours:delta};
  if(delta>6)return {...STAGE_GATE_FLOW[1],delta_hours:delta};
  if(delta>1)return {...STAGE_GATE_FLOW[2],delta_hours:delta};
  if(delta>0.5)return {...STAGE_GATE_FLOW[3],delta_hours:delta};
  if(delta>=0)return {...STAGE_GATE_FLOW[4],delta_hours:delta};
  return {...STAGE_GATE_FLOW[5],delta_hours:delta};
}
function stageActionText(gate,guardOk){
  const label=gate&&gate.label_cn||'赛前观察';
  if(label==='赛中/已开赛')return '比赛已开赛或已完赛，转入赛中状态/赛后复盘。';
  if(label==='锁盘/赛前确认')return '当前处于锁盘/赛前确认阶段；只做最后风险复核，不新增最终结论。';
  return `当前处于${label}阶段；若首发、盘口、天气等关键数据未齐，仍不进入最终结论。${guardOk?' 已通过 PLAY_GUARD，可按流程复核。':''}`;
}
function pBanner(){
  const r=RECS[active]||{};const gate=stageGate(r);
  const stageText=gate.label_cn+(gate.delta_hours!=null?` · 距开赛 ${gate.delta_hours.toFixed(2)}h`:'');
  if(backendConnected)
    return `<div class="banner ok"><span class="bi2">●</span> W1 后端已连接：当前阶段 <b>${esc(stageText)}</b>。可点击「开始预测」触发真实抓取 + 预测，成功后会刷新 ledger / match card / 比分矩阵 / 推荐。</div>`;
  return `<div class="banner"><span class="bi2">◌</span> 当前为<b>${esc(gate.label_cn)}静态快照预览</b>（${esc(gate.window_cn)}），W1 后端未连接。<code>/predict</code> 需要 W1 后端在线；连上后端后，下方按钮才会真实触发抓取 + 预测。</div>`;
}
function pHeader(r){
  const guard=r.data_quality&&r.data_quality.play_guard||{};
  const gOk=guard.pass===true;
  const stateOk=/通过/.test(r.w1_state||'');
  const gate=stageGate(r);
  const guardNote=`<div class="guardnote">PLAY_GUARD ${gOk?'已通过':'未通过'}：${esc(stageActionText(gate,gOk))} 这<b>不影响</b>连接后端后触发 /predict 抓取。</div>`;
  return `<div class="ph">
    <div class="teams">${r.home_flag||''} ${esc(r.home_team_cn)}<span class="vs">vs</span>${r.away_flag||''} ${esc(r.away_team_cn)}</div>
    <span class="ko">${esc(r.kickoff||'')}</span>
    <span class="badge ${stateOk?'pass':'wait'}">${esc(r.decision||(stateOk?'W1_PASS':'W1_WAIT'))}</span>
    <span class="badge ${gOk?'guard-ok':'guard-no'}" title="未通过=未进入最终结论；当前阶段由 kickoff_time 动态计算，不影响连接后端触发 /predict">PLAY_GUARD ${gOk?'✓':'✕'}</span>
  </div>${guardNote}`;
}
function pPredict(r){
  const flow=STAGE_GATE_FLOW;
  const gate=stageGate(r),cur=gate.label_cn;if(selStage==null)selStage=cur;
  const opts=RECS.map(x=>`${x.home_flag||''} ${esc(x.home_team_cn)}`);
  const stHtml=flow.map(s=>{const on=s.label_cn===selStage;const isCur=s.label_cn===cur;
    return `<button class="stg ${on?'sel':''}" onclick="selStage='${esc(s.label_cn)}';renderPanel()" title="${esc(s.window_cn||'')} · ${esc(s.description_cn||'')}">${esc(s.label_cn)}<small>${esc(s.window_cn||'')}</small>${isCur?'<span class="cur">当前</span>':''}</button>`;}).join('');
  const btn = backendConnected
    ? `<button class="go" id="goBtn" ${busy?'disabled':''} onclick="runPredict()">${busy?'正在抓取 + 预测…':'开始预测'}</button>`
    : `<button class="go off" id="goBtn" disabled title="后端未连接，暂不触发 /predict">连接后可预测</button>`;
  return `<div class="predict">
    <div class="prow">
      <div class="sel"><span>${r.home_flag||''}</span><select id="teamA"><option>${esc(r.home_team_cn)}</option></select></div>
      <span class="vsdot">VS</span>
      <div class="sel"><span>${r.away_flag||''}</span><select id="teamB"><option>${esc(r.away_team_cn)}</option></select></div>
      <div class="stages">${stHtml}</div>
      ${btn}
    </div>
    <div class="prog" id="prog"><span class="pm" id="progMsg"></span><div class="proglist" id="progList"></div></div>
  </div>`;
}
function pCore(r){
  const rv=r.recommendation_view||{};const sms=r.score_matrix_summary||{};
  const tops=sms.top_scores||[];
  const pP=(tops.find(t=>t.score===rv.primary_score)||{}).probability;
  const pS=(tops.find(t=>t.score===rv.secondary_score)||{}).probability;
  const t3=tops.slice(0,3);const tmax=t3.length?Math.max(...t3.map(t=>t.probability)):1;
  const t3html=t3.map((t,i)=>{const w=(t.probability/tmax*100).toFixed(0);const col=i===0?'var(--amber)':'var(--green)';
    return `<div class="brow"><span class="sc"${i===0?' style="color:var(--amber)"':''}>${esc(t.score)}</span><div class="track"><div class="fill" style="width:${w}%;background:${col}"></div></div><span class="pct">${fmtP(t.probability)}</span></div>`;}).join('');
  const src=backendConnected?'<span style="color:var(--green)">实时后端</span>':'<span style="color:var(--amber)">静态快照</span>';
  return `<div class="rec">
    <div class="cell"><div class="k">主比分</div><div class="v">${esc(rv.primary_score||'–')} <small>${fmtP(pP)}</small></div></div>
    <div class="cell"><div class="k">备选比分</div><div class="v sec">${esc(rv.secondary_score||'–')} <small>${fmtP(pS)}</small></div></div>
    <div class="cell act"><div class="k">参考倾向</div><div style="font-size:14px">${esc(r.reference_direction||'–')}</div>
      <div class="l3">赛前分析参考，非最终结论，不构成收益承诺。</div></div>
  </div>
  <div class="core2">
    <div class="card tight"><h3>风险路径摘要</h3><div class="risksum">${esc(rv.risk_path_summary||r.current_action_cn||'—')}</div></div>
    <div class="card tight"><h3>比分概率 · Top 3<span class="r">来源 · ${src}</span></h3><div class="bars">${t3html||'<div class="empty">—</div>'}</div></div>
  </div>`;
}
function pMatrix(r){
  const sms=r.score_matrix_summary||{};const lh=sms.lambda_home,la=sms.lambda_away,rho=sms.dixon_coles_rho!=null?sms.dixon_coles_rho:-0.0578;
  if(lh==null||la==null)return `<div class="card"><h3>比分概率矩阵 · DIXON-COLES</h3><div class="empty">该场暂无矩阵参数（未放行/数据缺失）。</div></div>`;
  const M=matrix(lh,la,rho);const rv=r.recommendation_view||{};
  const pri=parse(rv.primary_score),sec=parse(rv.secondary_score),act=r.actual_score?[r.actual_score.home,r.actual_score.away]:null;
  let mx=0;for(let i=0;i<7;i++)for(let j=0;j<7;j++)mx=Math.max(mx,M[i][j]);
  let grid='<div class="mxgrid">';
  for(let i=0;i<7;i++)for(let j=0;j<7;j++){const v=M[i][j],a=Math.sqrt(v/mx);
    let c='cx'+(a<0.18?' lo':'');
    if(pri&&pri[0]===i&&pri[1]===j)c+=' pri';if(sec&&sec[0]===i&&sec[1]===j)c+=' sec';if(act&&act[0]===i&&act[1]===j)c+=' act';
    grid+=`<div class="${c}" style="background:rgba(53,224,142,${(a*.92).toFixed(3)})" title="${i}-${j} · ${fmtP(v)}">${v*100<0.5?'':(v*100).toFixed(0)}</div>`;}
  grid+='</div>';
  const head='<div class="mxhead">'+[0,1,2,3,4,5,6].map(j=>`<span>${j}</span>`).join('')+'</div>';
  return `<div class="card"><h3>比分概率矩阵 · DIXON-COLES<span class="r">审计 / 模型调试</span></h3>
    <div class="note" style="margin:-2px 0 9px">该矩阵展示模型对各比分格子的概率分布，主要用于<b>审计与调试</b>，不是推荐列表。</div>
    <div class="mxwrap"><div class="mxaxis-y"><span>主</span><span>队</span><span>进</span><span>球</span></div>
    <div class="mx">${head}${grid}<div class="axlab"><span>← 客队进球</span><span>${esc(r.away_team_cn)} →</span></div></div></div>
    <div class="mxleg"><span class="mklab"><span class="sw" style="outline:2px solid var(--amber);outline-offset:-2px"></span>主比分</span>
    <span class="mklab"><span class="sw" style="outline:1.5px dashed var(--amber)"></span>备选</span>
    ${act?'<span class="mklab"><span class="sw" style="border:2px solid var(--red)"></span>实际</span>':''}
    <span style="flex:1"></span>低<span class="legbar"></span>高</div></div>`;
}
function pTopScores(r){
  const tops=(r.score_matrix_summary||{}).top_scores||[];if(!tops.length)return '';
  const rv=r.recommendation_view||{};const tmax=Math.max(...tops.map(t=>t.probability));
  const rows=tops.slice(0,8).map(t=>{const w=(t.probability/tmax*100).toFixed(0);
    const isP=t.score===rv.primary_score,isS=t.score===rv.secondary_score;
    const col=isP?'var(--amber)':isS?'#caa24a':'var(--green)';
    return `<div class="brow"><span class="sc" style="${isP?'color:var(--amber)':''}">${esc(t.score)}</span>
      <div class="track"><div class="fill" style="width:${w}%;background:${col}"></div></div><span class="pct">${fmtP(t.probability)}</span></div>`;}).join('');
  return `<div class="card tight"><h3>比分概率分布 · TOP 8<span class="r">按概率排序，非推荐列表</span></h3><div class="bars">${rows}</div></div>`;
}
function pMarket(r){
  const sms=r.score_matrix_summary||{};const dv=r.devig_1x2||[];
  const mh=[sms.home_win_prob,sms.draw_prob,sms.away_win_prob];
  const blue=['#5aa9e6','#9cc7ea','#5aa9e6'],green=['#35e08e','#7fe8b6','#35e08e'];
  const tri=(arr,cs)=>`<div class="tri">${[0,1,2].map(i=>`<div class="seg" style="background:${cs[i]}">${arr[i]!=null?(arr[i]*100).toFixed(0):'–'}</div>`).join('')}</div>`;
  const fitOk=(sms.market_fit_error!=null&&sms.market_fit_error<0.03);
  return `<div class="card" style="margin-top:14px"><h3>市场 vs 模型 · 1X2<span class="r">主胜 / 平 / 客胜</span></h3>
    <div class="mvm">
      ${dv.length?`<div class="hda"><span class="lab">市场</span>${tri(dv,blue)}</div>`:''}
      <div class="hda"><span class="lab">模型</span>${tri(mh,green)}</div>
      <div class="chips">
        <span class="kc">μ <b>${sms.mu_total_goals??'–'}</b></span>
        <span class="kc">δ <b>${sms.delta_goal_diff??'–'}</b></span>
        <span class="kc">λ主 <b>${sms.lambda_home??'–'}</b></span>
        <span class="kc">λ客 <b>${sms.lambda_away??'–'}</b></span>
        <span class="kc">ρ <b>${sms.dixon_coles_rho??'–'}</b></span>
        <span class="kc ${fitOk?'ok':'bad'}">市场复现误差 <b>${sms.market_fit_error!=null?sms.market_fit_error:'–'}${fitOk?' ✓':''}</b></span>
      </div>
    </div></div>`;
}
function pScenarios(r){
  const sms=r.score_matrix_summary||{};const rv=r.recommendation_view||{};
  const scen=[['防平（平局）',sms.draw_prob,'var(--mut)'],['打开局（总≥4）',sms.open_game_mass,'var(--blue)'],
    ['防线崩盘（热门输）',sms.collapse_mass,'var(--red)']];
  const smax=Math.max(...scen.map(s=>s[1]||0),0.3);
  const bars=scen.map(([nm,v,c])=>`<div class="scrow"><span class="nm">${nm}</span>
    <div class="track"><div class="fill" style="width:${((v||0)/smax*100).toFixed(0)}%;background:${c}"></div></div><span class="pct">${fmtP(v)}</span></div>`).join('');
  const rp=(rv.risk_paths||[]).map(p=>`<span class="pchip" title="${esc(p.reason_cn||'')}">${esc(p.path)} ${esc(p.score)} ${fmtP(p.probability)}</span>`).join('');
  const tp=(rv.tail_paths||[]).map(p=>`<span class="pchip tail" title="${esc(p.reason_cn||'')}">${esc(p.path)} ${esc(p.score)} ${fmtP(p.probability)}</span>`).join('');
  return `<div class="card"><h3>场景质量 · 来自矩阵区域（权重即概率）</h3>
    <div class="scen">${bars}</div>
    ${rv.risk_path_summary?`<div class="paths">${esc(rv.risk_path_summary)}<div style="margin-top:6px">风险路径 ${rp}</div>${tp?`<div style="margin-top:4px">尾部(压测) ${tp}</div>`:''}</div>`:''}
  </div>`;
}
function pDataQuality(r){
  const dq=r.data_quality||{};const o=dq.odds||{},l=dq.lineup||{},rf=dq.referee||{},inj=dq.injuries||{},g=dq.play_guard||{};
  const cls=s=>s==='success'||s==='available'?'ok':s==='missing'?'no':s==='partial'?'part':s==='empty'?'na':'na';
  const items=[
    ['赔率',o.status==='success'?`✓ ${o.bookmakers_count||0} 家`:esc(o.status||'–'),cls(o.status)],
    ['1X2/AH/OU',(o.has_1x2?'1X2 ':'')+(o.has_ah?'AH ':'')+(o.has_ou?'OU':'')||'–','ok'],
    ['首发',l.status==='missing'?'✕ 未确认':`${l.home_count||0}/${l.away_count||0}`,cls(l.status)],
    ['裁判',rf.status==='missing'?'✕ 未公布':esc(rf.name||rf.status),cls(rf.status)],
    ['伤停',inj.status==='empty'?'空':String(inj.count||0),cls(inj.status)],
    ['整体',esc(dq.overall||'–'),cls(dq.overall)],
  ];
  const gPass=g.pass===true;
  const fails=(g.fail_rules||[]).map(x=>ruleCn(x)).join('、');
  return `<div class="card"><h3>数据质量 · PLAY_GUARD<span class="r">${esc(dq.reason_cn||'')}</span></h3>
    <div class="dq">${items.map(([t,s,c])=>`<div class="dqi"><div class="t">${t}</div><div class="s ${c}">${s}</div></div>`).join('')}</div>
    <div class="guardbar ${gPass?'ok':'no'}"><span class="gl" style="color:${gPass?'var(--green)':'var(--red)'}">PLAY_GUARD ${gPass?'通过':'未通过'}</span>
      ${gPass?'<span class="fr">满足放行条件</span>':`<span class="fr">阻断规则：${fails||'—'}</span>`}</div>
  </div>`;
}
function ruleCn(x){const m={'lineups.confirmed_lineup':'首发未确认','match.referee':'裁判未公布','odds.markets':'盘口缺失','injuries.coverage':'伤停覆盖不足'};return m[x]||esc(x);}
function pLiveRefresh(r){
  const lr=r.live_refresh||{};const mods=lr.modules||{};const keys=Object.keys(mods);if(!keys.length)return '';
  const names={odds:'赔率',lineups:'首发',referee:'裁判',weather:'天气',injuries:'伤停'};
  const cls=s=>s==='success'?'ok':s==='skipped'?'skip':s==='failed'?'fail':'miss';
  const rows=keys.map(k=>{const m=mods[k];return `<div class="modr"><span class="mn">${names[k]||k}</span>
    <span class="ms ${cls(m.status)}">${esc(m.status)}</span><span class="mg">${esc(m.message_cn||m.source||'')}</span></div>`;}).join('');
  return `<div class="card"><h3>本次抓取流程状态<span class="r">总状态 ${esc(lr.overall_status||'–')}</span></h3><div class="mods">${rows}</div></div>`;
}
function pEnvironment(r){
  const e=r.environment_context||{};if(!e.venue_name&&!e.city)return '';
  const items=[['场馆',esc(e.venue_name||'–')],['城市',esc((e.city||'')+(e.country?' · '+e.country:''))],
    ['海拔',e.altitude_m!=null?e.altitude_m+' m':'–'],['顶棚',esc(e.roof_status||'–')],
    ['天气',e.weather_status==='missing'?'缺失':esc((e.temperature_c!=null?e.temperature_c+'°C ':'')+(e.weather_code||''))],
    ['当地开球',esc(e.kickoff_local_time||'–')]];
  const fl=(e.environment_risk_flags||[]).map(f=>{const sev=/HIGH/.test(f)?'h':/WEATHER|MED/.test(f)?'m':'l';return `<span class="eflag ${sev}">${esc(f)}</span>`;}).join('');
  return `<div class="card"><h3>比赛环境<span class="r">风险 ${esc(e.environment_risk_level||'–')}</span></h3>
    <div class="env">${items.map(([t,v])=>`<div class="envi"><div class="t">${t}</div><div class="v">${v}</div></div>`).join('')}</div>
    ${fl?`<div class="eflags">${fl}</div>`:''}${e.environment_summary_cn?`<div class="note">${esc(e.environment_summary_cn)}</div>`:''}</div>`;
}
function pFactors(r){
  const sup=(r.supporting_factors||[]).map(x=>`<li>${esc(x)}</li>`).join('');
  const con=(r.counter_factors||[]).map(x=>`<li>${esc(x)}</li>`).join('');
  const risks=(r.risk_flags||[]).map(x=>`<li><span class="sev ${x.severity}">${esc(x.severity)}</span><span>${esc(x.message)}</span></li>`).join('');
  const gaps=(r.data_gaps||[]).map(x=>`<li><span class="sev ${x.severity}">${esc(x.severity)}</span><span>${esc(x.message)}</span>${x.blocks_play?'<span class="blocks">阻断</span>':''}</li>`).join('');
  return `<div class="grid2">
    <div class="card tight"><h3>支持因子</h3>${sup?`<ul class="flist sup">${sup}</ul>`:'<div class="empty">无</div>'}
      ${con?`<h3 style="margin-top:12px">反对/谨慎因子</h3><ul class="flist con">${con}</ul>`:''}</div>
    <div class="card tight"><h3>风险旗标</h3>${risks?`<ul class="rflist" style="list-style:none;padding:0;margin:0">${risks}</ul>`:'<div class="empty">无</div>'}
      <h3 style="margin-top:12px">关键缺口</h3>${gaps?`<ul class="gaplist" style="list-style:none;padding:0;margin:0">${gaps}</ul>`:'<div class="empty">无</div>'}</div>
  </div>`;
}
function pMarketState(r){
  const om=r.odds_movement||{},d=om.display||{},pg=om.play_guard_input||{};
  return `<div class="marketstate ${esc((d.trend_badge||'thin'))}">
    <span class="mklabel">市场状态</span>
    <b>${esc(om.status_cn||om.status||'盘口状态暂缺')}</b>
    <span>${esc(d.normal_sentence_cn||'盘口状态暂缺。')}</span>
    <small>风控门槛：${esc(pg.recommended_gate_cn||pg.recommended_gate||'观察')}</small>
  </div>`;
}
function pMarketMove(r){
  const om=r.odds_movement||{},ms=r.market_signal||{},cm=om.cumulative_move||{},rm=om.recent_move||{},liq=om.liquidity||{},co=om.coherence||{},dig=om.digestion||{},pg=om.play_guard_input||{},cal=om.calibration||{},disp=om.display||{};
  const snapRows=(om.snapshots||[]).map(s=>`<tr><td>${esc(s.phase||'')}</td><td>${esc(s.captured_at_utc||'–')}</td><td>${esc(s.book_count??'–')}</td><td>${fmtP(s.x2&&s.x2.home_prob)}</td><td>${fmtP(s.x2&&s.x2.draw_prob)}</td><td>${fmtP(s.x2&&s.x2.away_prob)}</td><td>${s.ou&&s.ou.mu_total_goals!=null?Number(s.ou.mu_total_goals).toFixed(2):'–'}</td><td>${s.ah&&s.ah.supremacy_delta!=null?Number(s.ah.supremacy_delta).toFixed(2):'–'}</td></tr>`).join('');
  const outliers=(om.single_book_outliers||[]).map(o=>`<li>${esc(o.bookmaker||'unknown')} · ${esc(o.market||'')} · ${esc(o.note_cn||'偏离共识，已忽略')}</li>`).join('');
  return `<div class="grid2">
    <div class="card tight"><h3>盘口异动监控<span class="r">${esc(om.status_cn||om.status||'–')} · ${esc(om.status_reason_code||'')}</span></h3>
      <div class="note" style="margin-top:0">${esc(disp.expert_summary_cn||'')}</div>
      <div class="chips">
        <span class="kc">TV <b>${cm.x2_tv_distance??'–'}</b></span>
        <span class="kc">μ drift <b>${cm.mu_delta??'–'}</b></span>
        <span class="kc">累计 <b>${esc(cm.magnitude_overall||'–')}</b></span>
        <span class="kc">近端 <b>${esc(rm.magnitude||'–')}</b></span>
        <span class="kc">book_count <b>${liq.book_count_latest??'–'}</b></span>
        <span class="kc">spread <b>${liq.cross_book_spread_home_prob??'–'}</b></span>
        <span class="kc">stale <b>${liq.staleness_minutes??'–'}m</b></span>
        <span class="kc">gate <b>${esc(pg.recommended_gate_cn||pg.recommended_gate||'–')}</b></span>
        <span class="kc">cal <b>${esc((cal.calibrated||'none')+'/'+(cal.tier||'C'))}</b></span>
      </div>
      <div class="mtbl"><table><thead><tr><th>phase</th><th>captured</th><th>books</th><th>P主</th><th>P平</th><th>P客</th><th>μ</th><th>δ</th></tr></thead><tbody>${snapRows}</tbody></table></div>
      <div class="note">coherence：fit=${co.market_fit_error??'–'}，振荡=${co.oscillation_flag?'是':'否'}，跨家冲突=${co.cross_book_conflict_flag?'是':'否'}；首发消化窗口 ${esc((dig.lineup_window&&dig.lineup_window.start)||'T-75m')} ~ ${esc((dig.lineup_window&&dig.lineup_window.end)||'T-45m')}。</div>
      <div class="note">${outliers?`已忽略离群：<ul>${outliers}</ul>`:'单家异常价：无；若出现只透明展示，不参与结论。'}</div>
      <div class="note">${esc(om.disclaimer_cn||'市场盘口变动监控，仅用于赛前分析参考与风控门槛。')}</div>
    </div>
    <div class="card tight"><h3>市场信号<span class="r">${esc(ms.direction||'–')}</span></h3>
      <div class="note" style="margin-top:0">${esc(ms.summary_cn||'—')}</div></div>
  </div>`;
}
function pLineupTactic(r){
  const le=r.lineup_effect||{},te=r.tactical_effect||{};
  const miss=le.status==='missing'&&te.status==='missing';
  const chip=(lab,val)=>val&&val!=='unknown'?`<span class="kc">${lab} <b>${esc(val)}</b></span>`:'';
  return `<div class="grid2">
    <div class="card tight"><h3>阵容效应<span class="r">${esc(le.status||'–')}</span></h3>
      <div class="note" style="margin-top:0">${esc(le.lineup_summary_cn||'—')}</div>
      <div class="chips">${chip('攻',le.attacking_power_effect)}${chip('守',le.defensive_stability_effect)}${chip('中场',le.midfield_control_effect)}${(le.key_absences||[]).length?`<span class="kc bad">缺阵 <b>${le.key_absences.length}</b></span>`:''}</div></div>
    <div class="card tight"><h3>战术效应<span class="r">${esc(te.status||'–')}</span></h3>
      <div class="note" style="margin-top:0">${esc(te.tactical_summary_cn||'—')}</div>
      <div class="chips">${chip('节奏',te.tempo_effect)}${chip('转换',te.transition_effect)}${chip('定位球',te.set_piece_effect)}</div></div>
  </div>`;
}
function pCalibration(r){
  const sms=r.score_matrix_summary||{};const pmc=r.post_match_calibration||{};
  if(r.status!=='finished')return '';
  const as=r.actual_score?r.actual_score.home+'-'+r.actual_score.away:(pmc.actual_score||'–');
  const ap=pmc.actual_score_probability!=null?pmc.actual_score_probability:sms.actual_score_probability;
  const rps=pmc.rps_model!=null?pmc.rps_model:sms.rps_1x2;
  const ll=pmc.log_score_exact!=null?pmc.log_score_exact:sms.exact_score_log_loss;
  const rpsu=pmc.rps_uniform_baseline,beat=pmc.beat_uniform!=null?pmc.beat_uniform:(rps!=null&&rpsu!=null?rps<rpsu:null);
  return `<div class="calib ${beat===false?'miss':''}"><h3 style="margin:0 0 9px;font-family:var(--mono);font-size:10.5px;letter-spacing:1.2px;color:var(--mut)">赛后校准 · RPS / LOG-SCORE
      <span style="margin-left:auto;color:var(--mut2);font-weight:400">实际 ${esc(as)}${pmc.actual_score_rank?' · 矩阵第 '+pmc.actual_score_rank+' 高':''}</span></h3>
    <div class="calgrid">
      <div class="st"><div class="k">该比分概率</div><div class="v">${fmtP(ap)}</div></div>
      <div class="st"><div class="k">RPS · 模型</div><div class="v ${beat?'g':beat===false?'r':''}">${rps!=null?rps:'–'}</div></div>
      ${rpsu!=null?`<div class="st"><div class="k">RPS · 均匀</div><div class="v">${rpsu}</div></div>`:''}
      <div class="st"><div class="k">exact-score log loss</div><div class="v b">${ll!=null?ll:'–'}</div></div>
      ${beat!=null?`<div class="st"><div class="k">vs 基线</div><div class="v"><span class="beat ${beat?'y':'n'}">${beat?'跑赢均匀':'未跑赢'}</span></div></div>`:''}
    </div>${pmc.note_cn?`<div class="note">${esc(pmc.note_cn)}</div>`:''}</div>`;
}

function renderPanel(){
  const r=RECS[active];if(!r){$('#panel').innerHTML='<div class="empty">无数据</div>';return;}
  $('#panel').innerHTML=
    pBanner()+pHeader(r)+pPredict(r)+pCore(r)+
    pMarketState(r)+
    `<button class="expbtn" onclick="toggleExpert()"><span id="expCaret">${expertOpen?'▾':'▸'}</span> 专家展开区 / 模型调试<small>完整比分矩阵、Top 8、市场 vs 模型、数据质量、环境、因子、赛后校准</small></button>`+
    `<div id="expert" class="${expertOpen?'open':''}">`+
      `<div class="cols"><div>${pMatrix(r)}</div><div>${pTopScores(r)}${pMarket(r)}</div></div>`+
      pScenarios(r)+pDataQuality(r)+pLiveRefresh(r)+pEnvironment(r)+pFactors(r)+pMarketMove(r)+pLineupTactic(r)+pCalibration(r)+
    `</div>`;
}
function toggleExpert(){expertOpen=!expertOpen;const e=$('#expert');if(e)e.classList.toggle('open',expertOpen);const c=$('#expCaret');if(c)c.textContent=expertOpen?'▾':'▸';}

// ---- 预测流程: 仅后端连接时真实触发 /predict + 轮询 /progress ----
async function runPredict(){
  if(busy)return;
  if(!backendConnected){const p=$('#prog'),m=$('#progMsg');if(p)p.classList.add('on');if(m)m.innerHTML='<span class="pe">后端未连接：未触发 /predict，已保留当前静态快照。</span>';return;}
  const r=RECS[active];busy=true;renderPanel();
  const prog=$('#prog'),msg=$('#progMsg');if(prog)prog.classList.add('on');if(msg)msg.textContent='正在抓取 + 预测…';
  const payload={fixture_id:r.fixture_id,match:r.match,home_team_cn:r.home_team_cn,away_team_cn:r.away_team_cn,stage_cn:selStage};
  try{
    const res=await fetch('/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok)throw new Error('predict '+res.status);
    await pollProgress();
    const fresh=await fetchBackendDashboardData();backendConnected=true;markSource(true);D=fresh;prepRecs();          // 仅成功时替换快照
    if(!DAYS.includes(selDay))selDay=pickDefaultDay();
    active=Math.max(0,RECS.findIndex(x=>x.fixture_id===r.fixture_id));
    busy=false;renderStatusCards();renderDays();renderRail();renderPanel();
    const p=$('#prog'),m=$('#progMsg');if(p)p.classList.add('on');
    if(m)m.innerHTML='<span class="pm">完成 ✓ 已刷新 ledger / match card / 比分矩阵 / 推荐</span>';
  }catch(e){
    busy=false;renderPanel();                                  // 失败: 保留旧快照, 不覆盖
    const p=$('#prog'),m=$('#progMsg');if(p)p.classList.add('on');
    if(m)m.innerHTML='<span class="pe">预测失败：'+esc(e.message||'/predict 不可用')+'。已保留当前快照，未覆盖。</span>';
  }
}
async function pollProgress(){
  const list=$('#progList'),msg=$('#progMsg');
  for(let i=0;i<60;i++){
    let p;try{p=await (await fetch('/progress',{cache:'no-store'})).json();}catch(e){break;}
    if(p){msg.textContent=p.message_cn||p.message||'抓取中…';
      if(p.steps)list.innerHTML=p.steps.map(s=>`<span class="${esc(s.state||'waiting')}">${esc(s.index)}.${esc(s.label)}:${esc(s.state||'waiting')}</span>`).join('');
      else if(p.modules)list.innerHTML=Object.entries(p.modules).map(([k,v])=>`<span>${k}:${(v&&v.status)||v}</span>`).join('');
      if(p.status==='done'||p.status==='failed'||p.status==='error'||p.done||p.overall_status==='success'||p.overall_status==='failed')return;}
    await new Promise(r=>setTimeout(r,1000));
  }
}

// ---- 后端探测: 静态启动后, 后端上线则自动平滑切到实时数据 + 启用预测 ----
async function probeBackend(){
  if(backendConnected)return;
  try{
    const j=await fetchBackendDashboardData();backendConnected=true;markSource(true);
    const cur=RECS[active];D=j;prepRecs();
    if(!DAYS.includes(selDay))selDay=pickDefaultDay();
    if(cur){const i=RECS.findIndex(x=>x.fixture_id===cur.fixture_id);if(i>=0)active=i;}
    renderStatusCards();renderDays();renderRail();renderPanel();
  }catch(e){}
}

boot();
setInterval(probeBackend, 20000);
</script>
