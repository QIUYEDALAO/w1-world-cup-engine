  <style>
    :root { --bg:#f3f5f8; --panel:#fff; --ink:#16202f; --muted:#5d687a; --line:#dbe1ea; --wait:#b45309; --watch:#1d4ed8; --play:#15803d; --pass:#64748b; --accent:#0f766e; --danger:#b91c1c; --soft:#eef7f5; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC","Segoe UI",sans-serif; }
    header { background:#0f172a; color:#fff; padding:30px 34px 24px; }
    header h1 { margin:0 0 10px; font-size:34px; line-height:1.18; letter-spacing:0; }
    header p { margin:0; color:#d7dee9; font-size:17px; line-height:1.6; }
    main { max-width:1500px; margin:0 auto; padding:24px 32px 44px; }
    h2 { margin:30px 0 14px; font-size:23px; line-height:1.25; } h3 { margin:0 0 10px; font-size:17px; }
    .grid-status { display:grid; grid-template-columns:repeat(4,minmax(180px,1fr)); gap:14px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px; box-shadow:0 1px 3px rgba(15,23,42,.06); }
    .status-card { min-height:132px; display:flex; flex-direction:column; justify-content:space-between; }
    .status-label { font-size:17px; font-weight:800; } .status-count { font-size:38px; font-weight:900; line-height:1; margin:10px 0; } .status-hint { color:var(--muted); font-size:14px; line-height:1.45; }
    .wait { color:var(--wait); } .watch { color:var(--watch); } .play { color:var(--play); } .pass { color:var(--pass); }
    .meta-row { display:grid; grid-template-columns:repeat(3,minmax(220px,1fr)); gap:14px; margin-top:14px; }
    .meta-label { color:var(--muted); font-size:14px; font-weight:750; } .meta-value { margin-top:8px; font-size:20px; font-weight:850; overflow-wrap:anywhere; word-break:normal; }
    .boss { display:grid; grid-template-columns:1.35fr .85fr; gap:16px; margin-top:20px; } .boss-main { border-left:6px solid var(--wait); background:#fffaf3; }
    .boss-title { font-size:25px; font-weight:900; margin-bottom:14px; } .boss-conclusion { font-size:28px; font-weight:950; color:var(--wait); line-height:1.28; }
    .boss-list { display:grid; gap:10px; margin-top:16px; } .pill { display:inline-flex; align-items:center; width:fit-content; border-radius:999px; padding:7px 12px; background:var(--soft); color:var(--accent); font-weight:850; }
    .kv-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; } .kv { padding:12px; border:1px solid #edf1f6; border-radius:8px; background:#fbfcfe; } .k { color:var(--muted); font-size:13px; font-weight:800; } .v { margin-top:6px; font-size:17px; font-weight:850; line-height:1.35; overflow-wrap:anywhere; }
    .layout { display:grid; grid-template-columns:1.1fr .9fr; gap:18px; align-items:start; } .groups { display:grid; grid-template-columns:repeat(3,minmax(230px,1fr)); gap:14px; }
    .group-title { display:flex; justify-content:space-between; align-items:center; gap:10px; } .group-note { color:var(--muted); font-size:13px; margin:4px 0 10px; }
    .team { display:flex; align-items:center; gap:10px; padding:8px 0; border-top:1px solid #edf1f6; font-size:15px; } .seed { width:24px; height:24px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:#edf2f7; color:#475569; font-weight:850; font-size:12px; flex:0 0 auto; }
    .rule-list { display:grid; gap:10px; margin:0; padding:0; list-style:none; } .rule-list li { padding:12px 14px; background:#f8fafc; border:1px solid #edf1f6; border-radius:8px; font-weight:750; line-height:1.45; }
    .flow { display:grid; grid-template-columns:1fr 42px 1fr 42px 1fr; gap:8px; align-items:center; margin-top:14px; } .flow-box { min-height:110px; text-align:center; display:flex; flex-direction:column; justify-content:center; background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px; } .flow-num { font-size:38px; font-weight:950; color:var(--accent); } .flow-text { color:var(--muted); font-weight:750; line-height:1.45; } .arrow { text-align:center; color:#64748b; font-size:26px; font-weight:900; }
    table { width:100%; border-collapse:collapse; font-size:14px; } th,td { padding:10px; border-bottom:1px solid #edf1f6; text-align:left; white-space:normal; } th { background:#f8fafc; color:#475569; font-weight:900; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:18px; } .legend { display:grid; grid-template-columns:repeat(4,minmax(160px,1fr)); gap:12px; } .legend-item { border-top:5px solid var(--line); } .legend-item.wait-border { border-color:var(--wait); } .legend-item.watch-border { border-color:var(--watch); } .legend-item.play-border { border-color:var(--play); } .legend-item.pass-border { border-color:var(--pass); }
    .links { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; } a { color:#075985; text-decoration:none; font-weight:850; overflow-wrap:anywhere; } a:hover { text-decoration:underline; } .small { color:var(--muted); font-size:13px; line-height:1.5; }
    @media (max-width:1180px) { .grid-status { grid-template-columns:repeat(2,1fr); } .layout,.boss,.two-col { grid-template-columns:1fr; } .groups { grid-template-columns:repeat(2,1fr); } .legend { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:720px) { header,main { padding-left:16px; padding-right:16px; } header h1 { font-size:28px; } .grid-status,.meta-row,.groups,.kv-grid,.legend,.links { grid-template-columns:1fr; } .flow { grid-template-columns:1fr; } .arrow { transform:rotate(90deg); } .boss-conclusion { font-size:23px; } }
  </style>

document.getElementById('bossList').innerHTML = [['第一场',data.boss_view.first_match_cn],['正式判断时间',data.boss_view.formal_review_time_cst],['现在动作',data.boss_view.current_action]].map(([k,v]) => `<div><span class="pill">${k}</span> <strong>${v}</strong></div>`).join('');
const fm = data.first_match_cn;
document.getElementById('firstMatch').innerHTML = [['比赛',fm.match],['开赛时间',fm.kickoff],['当前状态',fm.decision],['首发',fm.lineup],['裁判',fm.referee],['赔率',fm.odds],['风控是否通过',fm.play_guard],['下一次刷新',fm.next_refresh]].map(([k,v]) => `<div class="kv"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
document.getElementById('groups').innerHTML = data.groups.map(g => `<div class="card"><div class="group-title"><h3>${g.group}组</h3><span class="pill">4队</span></div><div class="group-note">每组前2名直接晋级</div>${g.teams_cn.map((t,i)=>`<div class="team"><span class="seed">${i+1}</span><span>${t}</span></div>`).join('')}</div>`).join('');
document.getElementById('rules').innerHTML = data.advancement_rules_cn.map(x => `<li>${x}</li>`).join('');
document.getElementById('directQ').textContent = data.advancement_rules.direct_qualifiers;
document.getElementById('thirdQ').textContent = data.advancement_rules.best_third_qualifiers;
document.getElementById('r32').textContent = data.advancement_rules.round_of_32_total;
document.getElementById('legend').innerHTML = data.label_explain_cn.map((x,i) => `<div class="card legend-item ${['wait-border','watch-border','play-border','pass-border'][i]}"><h3>${x.label}</h3><div class="small">${x.meaning}</div></div>`).join('');
function table(headers, rows, mapper) { return `<thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${mapper(row).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody>`; }
document.getElementById('standingsTemplate').innerHTML = table(data.standings_headers_cn, data.groups[0].standings_template, r => [r.team_cn,r.P,r.W,r.D,r.L,r.GF,r.GA,r.GD,r.PTS]);
document.getElementById('thirdTemplate').innerHTML = table(data.third_place_headers_cn, data.third_place_ranking_template, r => [r.rank,r.group,r.team,r.points,r.goal_diff,r.goals_for,r.fair_play,r.drawing_of_lots]);
document.getElementById('links').innerHTML = data.report_entrypoints_cn.map(l => `<div class="card"><a href="${l.path}">${l.label}</a></div>`).join('');
</script>
