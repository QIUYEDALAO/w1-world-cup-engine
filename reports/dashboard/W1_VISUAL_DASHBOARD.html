  <title>W1 世界杯赛前预测总控台</title>
  <style>
    :root { --bg:#f4f6f8; --ink:#172033; --muted:#667085; --panel:#fff; --line:#d9e0ea; --brand:#0f766e; --brand2:#0f4c81; --wait:#b45309; --watch:#1d4ed8; --play:#15803d; --pass:#64748b; --risk:#b91c1c; --soft:#eef7f5; --warm:#fff7ed; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans CJK SC","Segoe UI",sans-serif; }
    header { background:linear-gradient(135deg,#0f172a 0%,#123a54 54%,#0f766e 100%); color:#fff; padding:34px 36px 30px; }
    header h1 { margin:0 0 10px; font-size:36px; line-height:1.18; letter-spacing:0; }
    header p { margin:0; max-width:980px; color:#e6edf6; font-size:18px; line-height:1.65; }
    main { max-width:1540px; margin:0 auto; padding:24px 32px 44px; }
    h2 { margin:30px 0 14px; font-size:24px; line-height:1.25; }
    h3 { margin:0 0 10px; font-size:18px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px; box-shadow:0 1px 3px rgba(15,23,42,.06); }
    .hero { display:grid; grid-template-columns:1.2fr .8fr; gap:16px; margin-top:18px; align-items:stretch; }
    .boss-main { border-left:7px solid var(--wait); background:#fffaf3; }
    .boss-title { font-size:26px; font-weight:950; margin-bottom:14px; }
    .boss-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .boss-item { padding:13px 14px; border:1px solid #f2dcc1; border-radius:9px; background:#fff; }
    .boss-k { color:#7c4a03; font-size:13px; font-weight:900; }
    .boss-v { margin-top:7px; font-size:19px; font-weight:950; line-height:1.35; overflow-wrap:anywhere; }
    .boss-note { margin-top:14px; padding:13px 14px; border-radius:9px; background:#ffedd5; color:#7c2d12; font-weight:850; line-height:1.55; }
    .status-grid { display:grid; grid-template-columns:repeat(4,minmax(170px,1fr)); gap:14px; }
    .status-card { min-height:128px; display:flex; flex-direction:column; justify-content:space-between; }
    .status-label { font-size:17px; font-weight:900; }
    .status-count { font-size:36px; font-weight:950; line-height:1; margin:10px 0; }
    .wait { color:var(--wait); } .watch { color:var(--watch); } .play { color:var(--play); } .pass { color:var(--pass); }
    .small { color:var(--muted); font-size:13px; line-height:1.55; }
    .pill { display:inline-flex; align-items:center; width:fit-content; border-radius:999px; padding:7px 12px; background:var(--soft); color:var(--brand); font-weight:900; }
    .meta-row { display:grid; grid-template-columns:repeat(3,minmax(220px,1fr)); gap:14px; margin-top:14px; }
    .meta-label { color:var(--muted); font-size:14px; font-weight:850; }
    .meta-value { margin-top:8px; font-size:20px; font-weight:950; overflow-wrap:anywhere; }
    .match-card { border-top:6px solid var(--brand); }
    .match-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .match-title { font-size:24px; font-weight:950; line-height:1.25; }
    .risk { color:#fff; background:var(--risk); border-radius:999px; padding:7px 12px; font-weight:900; white-space:nowrap; }
    .match-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
    .kv { padding:12px; border:1px solid #edf1f6; border-radius:8px; background:#fbfcfe; }
    .k { color:var(--muted); font-size:13px; font-weight:900; }
    .v { margin-top:6px; font-size:17px; font-weight:900; line-height:1.38; overflow-wrap:anywhere; }
    .list-box { margin-top:14px; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
    .list-box ul { margin:8px 0 0; padding-left:18px; color:#344054; line-height:1.65; }
    .layout { display:grid; grid-template-columns:1.12fr .88fr; gap:18px; align-items:start; }
    .groups { display:grid; grid-template-columns:repeat(2,minmax(320px,1fr)); gap:14px; }
    .group-title { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th,td { padding:9px 8px; border-bottom:1px solid #edf1f6; text-align:left; white-space:normal; }
    th { background:#f8fafc; color:#475569; font-weight:950; }
    .points-badge { display:inline-flex; align-items:center; justify-content:center; min-width:42px; padding:4px 8px; border-radius:999px; background:var(--warm); color:var(--wait); font-weight:950; }
    .path-list { display:grid; gap:8px; margin-top:12px; }
    .path-head,.path-row { display:grid; grid-template-columns:72px minmax(86px,.8fr) 1.4fr; gap:8px; align-items:start; }
    .path-head { color:#64748b; font-size:12px; font-weight:950; padding:0 10px; }
    .path-row { padding:9px 10px; border:1px solid #edf1f6; border-radius:8px; background:#fbfcfe; font-size:13px; line-height:1.45; }
    .path-rank { font-weight:950; } .path-slot { color:var(--brand); font-weight:950; } .path-opponent { color:var(--muted); }
    .rule-list { display:grid; gap:10px; margin:0; padding:0; list-style:none; }
    .rule-list li { padding:12px 14px; background:#f8fafc; border:1px solid #edf1f6; border-radius:8px; font-weight:850; line-height:1.45; }
    .flow { display:grid; grid-template-columns:1fr 42px 1fr 42px 1fr; gap:8px; align-items:center; margin-top:14px; }
    .flow-box { min-height:110px; text-align:center; display:flex; flex-direction:column; justify-content:center; background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px; }
    .flow-num { font-size:38px; font-weight:950; color:var(--brand); } .flow-text { color:var(--muted); font-weight:850; line-height:1.45; } .arrow { text-align:center; color:#64748b; font-size:26px; font-weight:950; }
    .legend { display:grid; grid-template-columns:repeat(4,minmax(160px,1fr)); gap:12px; }
    .legend-item { border-top:5px solid var(--line); }
    .legend-item.wait-border { border-color:var(--wait); } .legend-item.watch-border { border-color:var(--watch); } .legend-item.play-border { border-color:var(--play); } .legend-item.pass-border { border-color:var(--pass); }
    details { margin-top:14px; border:1px dashed #cbd5e1; border-radius:8px; padding:12px; background:#fbfcfe; }
    summary { cursor:pointer; color:var(--brand2); font-weight:950; }
    pre { white-space:pre-wrap; word-break:break-word; font-size:12px; line-height:1.5; color:#344054; }
    .links { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    a { color:#075985; text-decoration:none; font-weight:900; overflow-wrap:anywhere; } a:hover { text-decoration:underline; }
    footer { margin-top:30px; padding:18px; border-radius:10px; background:#0f172a; color:#e5e7eb; font-size:15px; line-height:1.65; font-weight:850; }
    @media (max-width:1180px) { .hero,.layout { grid-template-columns:1fr; } .status-grid { grid-template-columns:repeat(2,1fr); } .groups { grid-template-columns:1fr; } .list-box { grid-template-columns:1fr; } .legend { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:720px) { header,main { padding-left:16px; padding-right:16px; } header h1 { font-size:29px; } .boss-grid,.status-grid,.meta-row,.match-grid,.legend,.links { grid-template-columns:1fr; } .flow { grid-template-columns:1fr; } .arrow { transform:rotate(90deg); } .path-head,.path-row { grid-template-columns:1fr; } }
  </style>
</head>

<script>
const data = JSON.parse(document.getElementById('w1-data').textContent);
const s = data.status_cards;
const boss = data.boss_view;
const fm = data.first_match_cn;
function escapeHtml(value) { return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function li(items) { return '<ul>' + items.map(x => '<li>' + escapeHtml(x) + '</li>').join('') + '</ul>'; }
function table(headers, rows, mapper) { return '<table><thead><tr>' + headers.map(h=>'<th>'+escapeHtml(h)+'</th>').join('') + '</tr></thead><tbody>' + rows.map(row=>'<tr>' + mapper(row).map(v=>'<td>'+v+'</td>').join('') + '</tr>').join('') + '</tbody></table>'; }
document.getElementById('bossGrid').innerHTML = [
  ['当前状态', boss.current_status], ['第一场', boss.first_match_cn], ['参考倾向', boss.reference_lean], ['参考比分', boss.reference_score], ['当前动作', boss.current_action], ['正式判断', boss.formal_review_time_cst]
].map(([k,v]) => '<div class="boss-item"><div class="boss-k">'+escapeHtml(k)+'</div><div class="boss-v">'+escapeHtml(v)+'</div></div>').join('');
document.getElementById('bossNote').textContent = boss.explanation + '。' + boss.w1_guard_summary;
document.getElementById('backendList').innerHTML = li(data.w1_backend_kept);
document.getElementById('statusCards').innerHTML = data.status_cards_cn.map(item => '<div class="card status-card"><div class="status-label">'+escapeHtml(item.label)+'</div><div class="status-count '+item.class+'">'+item.count+' 场</div><div class="small">'+escapeHtml(item.hint)+'</div></div>').join('');
document.getElementById('metaCards').innerHTML = [['刷新器版本',s.watcher_version],['风控规则',s.play_guard_version],['下次刷新',s.next_refresh]].map(([k,v]) => '<div class="card"><div class="meta-label">'+escapeHtml(k)+'</div><div class="meta-value">'+escapeHtml(v)+'</div></div>').join('');
document.getElementById('firstMatchCard').innerHTML = '<div class="match-head"><div><div class="match-title">'+escapeHtml(fm.match)+'</div><div class="small">'+escapeHtml(fm.kickoff)+'</div></div><div class="risk">风险等级：'+escapeHtml(fm.risk_level)+'</div></div>' +
  '<div class="match-grid">' + [
    ['比赛', fm.match], ['开赛时间', fm.kickoff], ['当前结论', fm.current_conclusion], ['参考比分', fm.reference_score], ['当前动作', fm.current_action], ['是否通过 W1 风控', fm.play_guard_result]
  ].map(([k,v]) => '<div class="kv"><div class="k">'+escapeHtml(k)+'</div><div class="v">'+escapeHtml(v)+'</div></div>').join('') + '</div>' +
  '<div class="list-box"><div class="kv"><div class="k">支持理由</div>'+li(fm.supporting_factors)+'</div><div class="kv"><div class="k">反对理由</div>'+li(fm.counter_factors)+'</div><div class="kv"><div class="k">关键缺口</div>'+li(fm.key_gaps)+'</div></div>' +
  '<details><summary>展开技术详情</summary><pre>'+escapeHtml(JSON.stringify(fm.technical_details, null, 2))+'</pre></details>';
document.getElementById('groupNote').textContent = data.group_card_note_cn;
function miniStandings(rows) { return table(data.standings_compact_headers_cn, rows, r => [escapeHtml(r.team_cn), escapeHtml(r.P), escapeHtml(r.GD), '<span class="points-badge">'+escapeHtml(r.points_label)+'</span>']); }
function pathRows(paths) { const head = '<div class="path-head">'+data.qualification_path_headers_cn.map(h=>'<div>'+escapeHtml(h)+'</div>').join('')+'</div>'; return '<div class="path-list">'+head+paths.map(p=>'<div class="path-row"><div class="path-rank">'+escapeHtml(p.finish)+'</div><div class="path-slot">'+escapeHtml(p.slot)+'</div><div class="path-opponent">'+escapeHtml(p.opponent)+'</div></div>').join('')+'</div>'; }
document.getElementById('groups').innerHTML = data.groups.map(g => '<div class="card"><div class="group-title"><h3>'+escapeHtml(g.group)+'组</h3><span class="pill">前2直通</span></div><p class="small">'+escapeHtml(g.group_note_cn)+'</p>'+miniStandings(g.standings_template)+pathRows(g.qualification_paths)+'</div>').join('');
document.getElementById('rules').innerHTML = data.advancement_rules_cn.map(x => '<li>'+escapeHtml(x)+'</li>').join('');
document.getElementById('directQ').textContent = data.advancement_rules.direct_qualifiers;
document.getElementById('thirdQ').textContent = data.advancement_rules.best_third_qualifiers;
document.getElementById('r32').textContent = data.advancement_rules.round_of_32_total;
document.getElementById('pathNote').textContent = data.knockout_path_note_cn;
document.getElementById('legend').innerHTML = data.label_explain_cn.map((x,i) => '<div class="card legend-item '+['wait-border','watch-border','play-border','pass-border'][i]+'"><h3>'+escapeHtml(x.label)+'</h3><div class="small">'+escapeHtml(x.meaning)+'</div></div>').join('');
document.getElementById('links').innerHTML = data.report_entrypoints_cn.map(l => '<div class="card"><a href="'+escapeHtml(l.path)+'">'+escapeHtml(l.label)+'</a></div>').join('');
document.getElementById('footerStatement').textContent = data.page_footer_statement_cn;
</script>
